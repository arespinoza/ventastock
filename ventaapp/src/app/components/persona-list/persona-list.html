<div class="container mt-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/home">Home</a></li>
            <li class="breadcrumb-item active" aria-current="page">Personas</li>
        </ol>
    </nav>
    <h2>Gestión de Personas</h2>
    <p>A continuación se muestra la lista de Personas registradas.</p>

    <!-- Botón para agregar un nuevo persona -->
    <div class="mb-3">
        <button class="btn btn-primary" (click)="navigateTo('persona-form/0')">
            <i class="bi bi-plus-circle"></i> Agregar Persona
        </button>
    </div>

    <!-- Tabla para listar las personas -->
    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr >
                    <th scope="col">ID</th>
                    <th scope="col">Apellido</th>
                    <th scope="col">Nombres</th>
                    <th scope="col">Referencia</th>
                    <th scope="col">Email</th>
                    <th scope="col">Celular</th>
                    <th scope="col">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <!-- Fila de ejemplo 1: Persona Activo -->
                <tr *ngFor="let persona of personas">
                    <th scope="row">{{persona.id}}</th>
                    <td>{{persona.apellido}}</td>
                    <td>{{persona.nombres}}</td>
                    <td>{{persona.referencia}}</td>
                    <td>{{persona.correo_electronico}}</td>
                    <td>{{persona.nro_celular}}</td>
                    <td>
                        <button class="btn btn-warning btn-sm" title="Editar"
                            (click)="navigateTo('persona-form/' + persona.id)">
                            <i class="bi bi-pencil-square" type="button"></i>
                        </button>
                        <button class="btn btn-danger btn-sm" title="Eliminar"
                            (click)="deletePersona(persona.id)">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
